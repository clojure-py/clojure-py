name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref (PR updates etc).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each row: a GitHub-hosted runner mapped to a target triple.
          # All three major platforms, x64 + ARM64, using the free
          # public-repo runners.
          - { os: ubuntu-latest,    label: linux-x64 }
          - { os: ubuntu-24.04-arm, label: linux-arm64 }
          - { os: windows-latest,   label: windows-x64 }
          # windows-11-arm: actions/setup-python@v5 can't install 3.14t on
          # ARM64 yet — the extracted Python install is missing its stdlib
          # (`ModuleNotFoundError: encodings`). Re-add when upstream support
          # lands. Linux-arm64 still covers the ARM64 code path.
          - { os: macos-latest,     label: macos-arm64 }   # Apple Silicon
          # macos-x64 (macos-13 Intel) intentionally omitted — old hardware
          # we don't support; macos-arm64 is the only macOS target we ship.
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.14t (free-threaded)
        uses: actions/setup-python@v5
        with:
          python-version: "3.14t"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: ${{ matrix.label }}

      - name: Install build + test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin pytest pytest-timeout hypothesis

      - name: Build release wheel
        shell: bash
        run: maturin build --release --out dist --interpreter python

      - name: Install built wheel
        shell: bash
        # --force-reinstall so a cached wheel version doesn't shadow the
        # freshly built artifact; --no-deps because test deps were
        # installed above.
        run: python -m pip install --force-reinstall --no-deps dist/*.whl

      - name: Run tests
        shell: bash
        run: python -m pytest tests -q --durations=20

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: dist/*.whl
          if-no-files-found: error
